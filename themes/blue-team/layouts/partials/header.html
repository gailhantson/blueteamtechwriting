<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">
      <span class="logo-mark">&#9632;</span>
      <span class="logo-text">Blue Team<br><em>Tech Writing</em></span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if eq $.RelPermalink .URL }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
